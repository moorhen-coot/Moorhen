name: Run tests

on:
  # Every day at midnight UTC
  schedule:
  - cron: "0 0 * * *"
  push:
  pull_request:

jobs:
  run_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install node.js v22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: baby-gru/package-lock.json

    - name: Install system dependencies     
      run: |
        sudo apt-get update -y
        sudo apt-get install -y git bzr patch curl

    - name: Cache emsdk
      id: cache-emsdk
      uses: actions/cache@v4
      with: 
        path: emsdk/
        # Todo: change this key when this branch is ready to merge
        key: emsdk-cache-new

    - name: Download and install Emsdk
      if: steps.cache-emsdk.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/emscripten-core/emsdk.git
        cd emsdk/
        ./emsdk install latest

    - name: Activate Emsdk
      run: |
        cd emsdk/
        ./emsdk activate latest

    - name: Read Coot commit hash
      id: coot_commit
      # Sources VERSIONS (a shell snippet that sets $coot_commit) and
      # exports the value as a step output for use in cache keys below.
      run: |
        . ./VERSIONS
        echo "commit=${coot_commit}" >> "$GITHUB_OUTPUT"

    - name: Install Lhasa sources
      env:
        MOORHEN_SOURCE_DIR: ${{ github.workspace }}
      run: |
          source ./get_sources_funs && getlhasa
          cd .. && cp -rv checkout/LhasaReact baby-gru/src/

    - name: Install Node.js dependencies
      working-directory: baby-gru
      run: npm ci

    - name: Test Typescript transpilation
      working-directory: baby-gru
      run: |
        npm run create-version
        npm run transpile-protobuf
        npx graphql-codegen
        npx tsc
        
    - name: Run React tests
      working-directory: baby-gru
      run: npm run test-react
