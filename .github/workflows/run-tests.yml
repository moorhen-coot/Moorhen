name: Run tests

on:
  # Every day at midnight UTC
  schedule:
  - cron: "0 0 * * *"
  push:
  pull_request:

jobs:
  run_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install node.js v22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: baby-gru/package-lock.json

    - name: Install system dependencies     
      run: |
        sudo apt-get update -y
        sudo apt-get install -y git bzr patch curl

    - name: Cache emsdk
      id: cache-emsdk
      uses: actions/cache@v4
      with: 
        path: emsdk/
        # Todo: change this key when this branch is ready to merge
        key: emsdk-cache-new

    - name: Download and install Emsdk
      if: steps.cache-emsdk.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/emscripten-core/emsdk.git
        cd emsdk/
        ./emsdk install latest

    - name: Activate Emsdk
      run: |
        cd emsdk/
        ./emsdk activate latest

    # Todo: Resolve emsdk version tag
    - name: Read Coot commit hash
      id: coot_commit
      # Sources VERSIONS (a shell snippet that sets $coot_commit) and
      # exports the value as a step output for use in cache keys below.
      run: |
        . ./VERSIONS
        echo "commit=${coot_commit}" >> "$GITHUB_OUTPUT"
    - name: Cache Coot sources
      id: cache-coot-src
      uses: actions/cache@v4
      with:
        path: checkout/coot-1.0
        key: coot-src-${{ steps.coot_commit.outputs.commit }}
    - name: Download Coot sources
      if: steps.cache-coot-src.outputs.cache-hit != 'true'
      env:
        MOORHEN_SOURCE_DIR: ${{ github.workspace }}
      run: |
        source ./get_sources_funs && getcoot
    - name: Cache prebuilt C++ dependencies with sources (without Coot and Lhasa)
      id: cache-dependencies
      uses: actions/cache@v4
      with:
        path: |
          checkout/
          install/
          CCP4_WASM_BUILD/
          !checkout/coot-1.0
          !checkout/LhasaReact
        key: prebuilt-deps-${{ hashFiles('VERSIONS', 'initial_build.sh', 'get_sources', 'get_sources_funs', 'moorhen_build.sh') }}-emsdk-latest
    - name: Download C++ dependencies
      if: steps.cache-dependencies.outputs.cache-hit != 'true'
      run: |
        ./get_sources
    - name: Build C++ dependencies
      if: steps.cache-dependencies.outputs.cache-hit != 'true'
      run: |
        source emsdk/emsdk_env.sh
        # This also build Moorhen, but we don't care about it here.
        ./initial_build.sh
    # The proper build of Moorhen. Todo: Cache it.
    - name: Build Moorhen WASM
      run: |
        source emsdk/emsdk_env.sh
        ./moorhen_build.sh
    - name: Install Node.js dependencies
      working-directory: baby-gru
      run: npm ci

    - name: Test Typescript transpilation
      working-directory: baby-gru
      run: |
        npm run create-version
        npm run transpile-protobuf
        npx graphql-codegen
        npx tsc
        
    - name: Run React tests
      working-directory: baby-gru
      run: npm run test-react
    - name: Run tests
      working-directory: baby-gru
      run: |
        source emsdk/emsdk_env.sh
        npm test
