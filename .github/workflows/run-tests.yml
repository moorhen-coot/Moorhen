name: Run tests

on:
  # Every day at midnight UTC
  schedule:
  - cron: "0 0 * * *"
  push:
  pull_request:

jobs:
  run_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install node.js v22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: baby-gru/package-lock.json

    - name: Install Lhasa sources
      working-directory: /home/runner/work/Moorhen/Moorhen
      env:
        MOORHEN_SOURCE_DIR: /home/runner/work/Moorhen/Moorhen
      run: |
          source ./get_sources_funs && getlhasa
          cd .. && cp -rv checkout/LhasaReact baby-gru/src/

    - name: Install dependencies
      working-directory: baby-gru
      run: npm ci

    - name: Test typescript transpilation
      working-directory: baby-gru
      run: |
        npm run create-version
        npm run transpile-protobuf
        npx graphql-codegen
        npx tsc
        
    - name: Run react tests
      working-directory: baby-gru
      run: npm run test-react
