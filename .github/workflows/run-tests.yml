name: Run tests

on:
  # Every day at midnight UTC
  schedule:
  - cron: "0 0 * * *"
  push:
  pull_request:

jobs:
  run_tests:
    runs-on: ubuntu-latest
    env:
      TARGET_EMSDK_VERSION: 5.0.3
    timeout-minutes: 240
    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install node.js v22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: baby-gru/package-lock.json

    - name: Install system dependencies     
      run: |
        sudo apt-get update -y
        sudo apt-get install -y git bzr patch curl meson cmake bison flex pkg-config build-essential

    - name: Cache emsdk
      id: cache-emsdk
      uses: actions/cache@v4
      with: 
        path: emsdk/
        key: emsdk-cache-${{ env.TARGET_EMSDK_VERSION }}

    - name: Download and install Emsdk
      if: steps.cache-emsdk.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/emscripten-core/emsdk.git
        cd emsdk/
        ./emsdk install $TARGET_EMSDK_VERSION

    - name: Activate Emsdk
      run: |
        cd emsdk/
        ./emsdk activate $TARGET_EMSDK_VERSION

    - name: Read Coot commit hash
      id: coot_commit
      # Sources VERSIONS and
      # exports the value as a step output for use in cache keys below.
      run: |
        . ./VERSIONS
        echo "commit=${coot_commit}" >> "$GITHUB_OUTPUT"
    - name: Read LhasaReact commit hash
      id: lhasa_commit
      # Sources VERSIONS and
      # exports the value as a step output for use in cache keys below.
      run: |
        . ./VERSIONS
        echo "commit=${lhasa_commit}" >> "$GITHUB_OUTPUT"
    - name: Cache Coot and Lhasa sources
      id: cache-coot-lhasa-src
      uses: actions/cache@v4
      with:
        path: |
          checkout/coot-1.0
          checkout/LhasaReact
        key: coot-src-${{ steps.coot_commit.outputs.commit }}-lhasa-src-${{ steps.lhasa_commit.outputs.commit }}
    - name: Download Coot and LhasaReact sources
      if: steps.cache-coot-lhasa-src.outputs.cache-hit != 'true'
      env:
        MOORHEN_SOURCE_DIR: ${{ github.workspace }}
      run: |
        source ./get_sources_funs && getcoot && getlhasa
    - name: Cache prebuilt C++ dependencies with sources (without Coot and Lhasa)
      id: cache-cpp-dependencies
      uses: actions/cache@v4
      with:
        # include/glm and rdkit are symlinks to the GLM headers and to the rdkit sources respectively.
        # They need to be included in the cache, I think.
        path: |
          checkout/
          install/
          CCP4_WASM_BUILD/
          include/glm
          rdkit
          !checkout/coot-1.0
          !checkout/LhasaReact
        key: prebuilt-deps-${{ hashFiles('VERSIONS', 'initial_build.sh', 'get_sources', 'get_sources_funs', 'moorhen_build.sh') }}-emsdk-${{ env.TARGET_EMSDK_VERSION }}
    - name: Download C++ dependencies
      if: steps.cache-cpp-dependencies.outputs.cache-hit != 'true'
      run: |
        ./get_sources
    - name: Build C++ dependencies
      if: steps.cache-cpp-dependencies.outputs.cache-hit != 'true'
      run: |
        source emsdk/emsdk_env.sh
        # This also builds Moorhen, but we don't care about it here.
        ./initial_build.sh
    - name: Cache Moorhen WASM build
      id: cache-moorhen-wasm
      uses: actions/cache@v4
      with:
        path: |
          baby-gru/public/MoorhenAssets/
        key: moorhen-wasm-${{ hashFiles('CMakeLists.txt', 'wasm_src/**', 'wasm_src_frontend/**', 'metaballs/**', 'VERSIONS', 'moorhen_build.sh') }}-coot-${{ steps.coot_commit.outputs.commit }}-lhasa-${{ steps.lhasa_commit.outputs.commit }}-deps-${{ hashFiles('VERSIONS', 'initial_build.sh', 'get_sources', 'get_sources_funs', 'moorhen_build.sh') }}-emsdk-${{ env.TARGET_EMSDK_VERSION }}
    - name: Build Moorhen WASM
      if: steps.cache-moorhen-wasm.outputs.cache-hit != 'true'
      run: |
        source emsdk/emsdk_env.sh
        ./moorhen_build.sh
    - name: Set up LhasaReact and monomers
      if: steps.cache-moorhen-wasm.outputs.cache-hit == 'true'
      run: |
        rm -rf baby-gru/src/LhasaReact
        cp -r checkout/LhasaReact baby-gru/src/
        ln -sf ${{ github.workspace }}/checkout/monomers baby-gru/public/MoorhenAssets/monomers
    - name: Install Node.js dependencies
      working-directory: baby-gru
      run: npm ci

    - name: Test Typescript transpilation
      working-directory: baby-gru
      run: |
        npm run create-version
        npm run transpile-protobuf
        npx graphql-codegen
        npx tsc
        
    - name: Run React tests
      working-directory: baby-gru
      run: npm run test-react
    - name: Run tests
      working-directory: baby-gru
      run: |
        source emsdk/emsdk_env.sh
        npm test
