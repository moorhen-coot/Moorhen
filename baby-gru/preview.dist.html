<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moorhen Dist Preview</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: sans-serif;
            background: #f3f5f7;
        }

        main {
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 0.75rem;
            box-sizing: border-box;
        }

        .header {
            flex: 0 0 auto;
            background: #ffffff;
            border: 1px solid #d9dee3;
            border-radius: 8px;
            padding: 0.75rem;
        }

        .header h1 {
            margin: 0;
            font-size: 1rem;
        }

        .header p {
            margin: 0.35rem 0 0;
            font-size: 0.875rem;
            color: #3a4958;
        }

        moorhen-web-component {
            flex: 1 1 auto;
            min-height: 0;
            border: 1px solid #cfd6de;
            border-radius: 8px;
            overflow: hidden;
            background: #ffffff;
        }
    </style>
</head>
<body>
    <main>
        <div class="header">
            <h1>Moorhen Webpack Dist Preview</h1>
            <p>Loaded from ./dist/moorhen.js with assets from ./dist/public/MoorhenAssets</p>
        </div>

        <moorhen-web-component id="moorhen-dist-preview" url-prefix="dist/public/MoorhenAssets"></moorhen-web-component>
    </main>

    <script type="module">
        import { registerMoorhenWebComponent } from "./dist/moorhen.js";

        registerMoorhenWebComponent();
    </script>
</body>
</html>
